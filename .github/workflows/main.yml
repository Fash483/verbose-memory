jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract and Flatten ZIP
        shell: bash
        run: |
          set -euo pipefail
          shopt -s dotglob nullglob

          # Find the zip file safely
          ZIP_FILE=$(find . -maxdepth 1 -name '*.zip' -print -quit)
          [ -n "$ZIP_FILE" ] || { echo "No ZIP found"; exit 1; }

          mkdir extract_tmp
          unzip -q "$ZIP_FILE" -d extract_tmp

          # Identify true project root inside ZIP
          items=()
          for f in extract_tmp/*; do
            base=$(basename "$f")
            [[ "$base" == ".git" || "$base" == "__MACOSX" || "$base" == ".DS_Store" ]] && continue
            items+=("$f")
          done

          if [ ${#items[@]} -eq 1 ] && [ -d "${items[0]}" ]; then
            echo "Single top-level folder detected: $(basename "${items[0]}")"
            SRC="${items[0]}"
          else
            echo "Flat root structure detected."
            SRC="extract_tmp"
          fi

          # Clean up zip before moving files to avoid self-copying
          rm -f "$ZIP_FILE"

          # Use rsync to safely merge directories and hidden files seamlessly
          rsync -a --exclude='.git' "$SRC/" ./

          rm -rf extract_tmp
