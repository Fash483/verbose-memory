name: Extract ZIP Workflow

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract and Flatten ZIP
        shell: bash
        run: |
          set -euo pipefail

          # 1. Locate the target ZIP file
          ZIP_FILE=$(find . -maxdepth 1 -name '*.zip' -print -quit)
          [ -n "$ZIP_FILE" ] || { echo "Error: No ZIP file found"; exit 1; }
          echo "=== FOUND ZIP FILE ==="
          echo "$ZIP_FILE"

          # DIAGNOSTIC 1: Print what is actually INSIDE the zip file before doing anything
          echo "=== CONTENTS OF ZIP FILE ==="
          unzip -l "$ZIP_FILE"

          # 2. Setup isolated temporary directory
          rm -rf extract_tmp target_dir
          mkdir extract_tmp target_dir
          
          # Unzip to extraction chamber
          unzip -q "$ZIP_FILE" -d extract_tmp
          rm -f "$ZIP_FILE"

          # Remove system metadata junk safely
          find extract_tmp -name "__MACOSX" -exec rm -rf {} + 2>/dev/null || true
          find extract_tmp -name ".DS_Store" -exec rm -f {} + 2>/dev/null || true

          # 3. Determine structure using explicit file listing
          shopt -s dotglob nullglob
          items=(extract_tmp/*)
          shopt -u dotglob nullglob

          if [ ${#items[@]} -eq 1 ] && [ -d "${items[0]}" ]; then
            SRC="${items[0]}"
            echo "=== STRUCTURE: Single top-level folder detected: $(basename "$SRC") ==="
          else
            SRC="extract_tmp"
            echo "=== STRUCTURE: Flat root structure detected ==="
          fi

          # 4. Move everything to target_dir using explicit find to bypass shell wildcard bugs
          find "$SRC" -mindepth 1 -maxdepth 1 -exec mv -t target_dir/ {} +

          # 5. Clean up temp folder
          rm -rf extract_tmp
          
          # 6. Copy safely to current working directory root
          find target_dir -mindepth 1 -maxdepth 1 -exec cp -rp -t ./ {} +
          rm -rf target_dir
          
          # DIAGNOSTIC 2: Print exactly what files now exist in your workspace
          echo "=== FINAL WORKSPACE CONTENTS ==="
          ls -la
