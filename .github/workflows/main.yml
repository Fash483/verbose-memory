jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP
        shell: bash
        run: |
          set -e

          ZIP_FILE=$(find . -maxdepth 1 -name '*.zip' | head -n1)
          [ -n "$ZIP_FILE" ] || { echo "No ZIP found"; exit 1; }

          mkdir extract_tmp
          unzip -q "$ZIP_FILE" -d extract_tmp

          shopt -s dotglob nullglob
          items=(extract_tmp/*)

          if [ ${#items[@]} -eq 1 ] && [ -d "${items[0]}" ]; then
            echo "Single top-level folder detected."
            mv "${items[0]}"/* .
          else
            echo "No top-level folder."
            mv extract_tmp/* .
          fi

          rm -rf extract_tmp
