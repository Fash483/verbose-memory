name: Extract ZIP Workflow

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract and Flatten ZIP
        shell: bash
        run: |
          set -euo pipefail
          shopt -s dotglob nullglob

          # 1. Locate the target ZIP file
          ZIP_FILE=$(find . -maxdepth 1 -name '*.zip' -print -quit)
          [ -n "$ZIP_FILE" ] || { echo "Error: No ZIP file found in root directory"; exit 1; }
          echo "Found ZIP file: $ZIP_FILE"

          # 2. Setup isolated temporary directory
          mkdir extract_tmp
          unzip -q "$ZIP_FILE" -d extract_tmp

          # 3. Scan directory items while ignoring systemic OS noise
          items=()
          for f in extract_tmp/*; do
            base=$(basename "$f")
            [[ "$base" == ".git" || "$base" == "__MACOSX" || "$base" == ".DS_Store" ]] && continue
            items+=("$f")
          done

          # FIX: Explicitly check element index 0 for the single nested directory path
          if [ ${#items[@]} -eq 1 ] && [ -d "${items[0]}" ]; then
            echo "Single top-level folder detected: $(basename "${items[0]}")"
            SRC="${items[0]}"
          else
            echo "Flat root structure detected."
            SRC="extract_tmp"
          fi

          # 4. Safe housecleaning before payload transfer
          rm -f "$ZIP_FILE"

          # 5. Execute synchronization and clean up
          rsync -a --exclude='.git' "$SRC/" ./
          rm -rf extract_tmp
          
          echo "Extraction and migration completed successfully."
